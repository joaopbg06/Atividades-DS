<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localização</title>

    <style>

        #wazeMap{
            width: 1000px;
            height: 400px;
        }

    </style>

</head>
<body>

    <iframe src="" id="wazeMap"></iframe>
    <a href="" id="wazeRota">Link rota</a>

    <script>

        navigator.geolocation.getCurrentPosition(funciona, erro)

        function funciona(pos) {
            var la = pos.coords.latitude;
            var lo = pos.coords.longitude;

            var laR = -23.547748923242736;
            var loR = -46.35860953318155;

            urlLink = `https://embed.waze.com/iframe?zoom=18&lat=${la}&lon=${lo}}`;
            urlRota = `https://www.waze.com/live-map/directions?to=${la}%2C${lo}&from=${laR}%2C${loR}`;
            
            document.getElementById('wazeMap').src = urlLink;
            document.getElementById('wazeRota').href = urlRota;
        }

        function erro(){
            console.log('Não foi possível localizar');
        }

    </script>
    
</body>
</html>
